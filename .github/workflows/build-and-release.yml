name: Build WSL Distribution and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: tp-ubuntu
  DISTRIBUTION_NAME: TechnicalPlatform
  REPREPRO_DIR: tp-apt-repo
  CODENAME: noble

jobs:
  build-packages:
    name: Build Custom Debian Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev build-essential fakeroot

      - name: Build .deb packages
        id: build
        run: |
          mkdir -p built-packages
          PACKAGES_BUILT=false

          # Find and build all packages in packages/ directory
          if [ -d "packages" ]; then
            for pkg_dir in packages/*/; do
              if [ -d "$pkg_dir/DEBIAN" ]; then
                pkg_name=$(basename "$pkg_dir")
                echo "Building package: $pkg_name"
                dpkg-deb --build "$pkg_dir" "built-packages/${pkg_name}.deb"
                PACKAGES_BUILT=true
              fi
            done
          fi

          if [ "$PACKAGES_BUILT" = "true" ]; then
            echo "packages_built=true" >> $GITHUB_OUTPUT
            ls -lh built-packages/
          else
            echo "packages_built=false" >> $GITHUB_OUTPUT
            echo "No packages found to build"
          fi

      - name: Upload package artifacts
        if: steps.build.outputs.packages_built == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: debian-packages
          path: built-packages/*.deb

  update-apt-repo:
    name: Update APT Repository and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-packages
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          name: debian-packages
          path: built-packages
        continue-on-error: true

      - name: Check if packages were downloaded
        id: check_packages
        run: |
          if [ -d "built-packages" ] && [ -n "$(ls -A built-packages/*.deb 2>/dev/null)" ]; then
            echo "has_packages=true" >> $GITHUB_OUTPUT
            echo "Packages found:"
            ls -lh built-packages/
          else
            echo "has_packages=false" >> $GITHUB_OUTPUT
            echo "No packages downloaded"
          fi

      - name: Set up reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Initialize reprepro repository
        run: |
          mkdir -p ${{ env.REPREPRO_DIR }}/conf

          cat > ${{ env.REPREPRO_DIR }}/conf/distributions <<EOF
          Origin: Technical Platform Repository
          Label: Technical Platform
          Codename: ${{ env.CODENAME }}
          Architectures: amd64 arm64 source
          Components: main
          Description: Custom packages for WSL Ubuntu distribution
          EOF

          cat > ${{ env.REPREPRO_DIR }}/conf/options <<EOF
          verbose
          basedir .
          EOF

      - name: Add packages to repository
        if: steps.check_packages.outputs.has_packages == 'true'
        run: |
          cd ${{ env.REPREPRO_DIR }}
          for deb in ../built-packages/*.deb; do
            echo "Adding package: $deb"
            reprepro includedeb ${{ env.CODENAME }} "$deb"
          done

      - name: Generate repository index
        run: |
          cd ${{ env.REPREPRO_DIR }}
          reprepro export ${{ env.CODENAME }}
          reprepro list ${{ env.CODENAME }}

      - name: Create GitHub Pages structure
        run: |
          mkdir -p gh-pages

          # Copy repository structure (only if directories exist)
          if [ -d "${{ env.REPREPRO_DIR }}/dists" ]; then
            cp -r ${{ env.REPREPRO_DIR }}/dists gh-pages/
          fi

          if [ -d "${{ env.REPREPRO_DIR }}/pool" ]; then
            cp -r ${{ env.REPREPRO_DIR }}/pool gh-pages/
          fi

          # Create index.html for repository
          cat > gh-pages/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
              <title>Technical Platform APT Repository</title>
          </head>
          <body>
              <h1>Technical Platform Ubuntu APT Repository</h1>
              <p>Add this repository to your sources:</p>
              <pre>deb [trusted=yes] https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} ${{ env.CODENAME }} main</pre>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true

  build-wsl-image:
    name: Build WSL Distribution Image
    runs-on: ubuntu-latest
    needs: update-apt-repo
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          name: debian-packages
          path: packages-built
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          # Build with custom APT repository URL
          docker build \
            --build-arg APT_REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:latest \
            --file Dockerfile \
            .

      - name: Export Docker rootfs to tar.gz
        run: |
          # Create container and export filesystem
          container_id=$(docker create ${{ env.DOCKER_IMAGE_NAME }}:latest)
          docker export $container_id | gzip > ${{ env.DISTRIBUTION_NAME }}.tar.gz
          docker rm $container_id

          ls -lh ${{ env.DISTRIBUTION_NAME }}.tar.gz

      - name: Create WSL distribution installer
        run: |
          # Copy tar.gz as .wsl for easier import
          cp ${{ env.DISTRIBUTION_NAME }}.tar.gz ${{ env.DISTRIBUTION_NAME }}.wsl

          # Create installation instructions
          cat > INSTALL.txt <<EOF
          Technical Platform Ubuntu Distribution Installation
          ===========================================

          To install this custom WSL distribution:

          1. Download the ${{ env.DISTRIBUTION_NAME }}.wsl file

          2. Open PowerShell or Command Prompt and run:
             wsl --import ${{ env.DISTRIBUTION_NAME }} <InstallLocation> ${{ env.DISTRIBUTION_NAME }}.wsl

             Example:
             wsl --import ${{ env.DISTRIBUTION_NAME }} C:\\WSL\\${{ env.DISTRIBUTION_NAME }} ${{ env.DISTRIBUTION_NAME }}.wsl

          3. Launch the distribution:
             wsl -d ${{ env.DISTRIBUTION_NAME }}

          4. Set default user (optional):
             ${{ env.DISTRIBUTION_NAME }} config --default-user developer

          APT Repository:
          ---------------
          This distribution is pre-configured with the custom APT repository:
          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

          Features:
          ---------
          - Ubuntu Noble (WSL2 optimized)
          - Systemd enabled
          - WSLg GUI support
          - Java 21 (via SDKMAN)
          - Node 24 LTS (via NVM)
          - Angular CLI
          - IntelliJ IDEA Ultimate (via Snap)
          - Antigravity tool
          - Custom MCP server port (64343)
          EOF

      - name: Generate checksums
        run: |
          sha256sum ${{ env.DISTRIBUTION_NAME }}.tar.gz > ${{ env.DISTRIBUTION_NAME }}.tar.gz.sha256
          sha256sum ${{ env.DISTRIBUTION_NAME }}.wsl > ${{ env.DISTRIBUTION_NAME }}.wsl.sha256

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wsl-distribution
          path: |
            ${{ env.DISTRIBUTION_NAME }}.tar.gz
            ${{ env.DISTRIBUTION_NAME }}.wsl
            ${{ env.DISTRIBUTION_NAME }}.tar.gz.sha256
            ${{ env.DISTRIBUTION_NAME }}.wsl.sha256
            INSTALL.txt

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-wsl-image
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download distribution artifacts
        uses: actions/download-artifact@v5
        with:
          name: wsl-distribution
          path: release-files

      - name: Create Release (as draft)
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          files: |
            release-files/${{ env.DISTRIBUTION_NAME }}.tar.gz
            release-files/${{ env.DISTRIBUTION_NAME }}.wsl
            release-files/${{ env.DISTRIBUTION_NAME }}.tar.gz.sha256
            release-files/${{ env.DISTRIBUTION_NAME }}.wsl.sha256
            release-files/INSTALL.txt
          body: |
            > **⚠️ This release is in draft mode pending automated quality gate tests.**
            >
            > The release will be automatically published once all E2E tests pass.


            ## Technical Platform Ubuntu Distribution Release

            This release includes a pre-configured Ubuntu Noble WSL2 distribution with:

            - ✅ Systemd and WSLg GUI support
            - ☕ Java 21 (SDKMAN)
            - 🅰️ Angular CLI (Node 24 LTS)
            - 🧠 IntelliJ IDEA Ultimate
            - 🚀 Antigravity tool
            - 📦 Custom APT repository integration
            - 🔧 MCP server configured on port 64343

            ### Installation

            Download `${{ env.DISTRIBUTION_NAME }}.wsl` and run:
            ```powershell
            wsl --import ${{ env.DISTRIBUTION_NAME }} <InstallLocation> ${{ env.DISTRIBUTION_NAME }}.wsl
            ```

            See `INSTALL.txt` for detailed instructions.

            ### APT Repository

            The distribution includes access to custom packages via:
            ```
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
            ```
          generate_release_notes: true
