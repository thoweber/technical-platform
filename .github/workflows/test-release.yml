# SPDX-License-Identifier: MIT
name: End-to-End Release Testing

on:
  workflow_run:
    workflows: ["Build WSL Distribution and Publish"]
    types:
      - completed
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test (e.g., v1.0.0, or leave empty for latest)'
        required: false
        type: string

env:
  DISTRIBUTION_NAME: TechnicalPlatform
  TEST_DISTRO_NAME: TechnicalPlatform-E2E-Test

jobs:
  test-release-artifacts:
    name: Test Release Artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release tag
        id: release
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event.workflow_run.head_branch }}" =~ ^v[0-9] ]]; then
            tag="${{ github.event.workflow_run.head_branch }}"
          else
            tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Testing release: $tag"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download artifact from parent workflow run
        if: github.event_name == 'workflow_run' && github.event.workflow_run.id != ''
        uses: actions/download-artifact@v8
        with:
          name: wsl-distribution
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Flatten downloaded artifact subdirectories
        shell: bash
        run: |
          if [ -d "wsl-distribution" ]; then
            mv wsl-distribution/* . 2>/dev/null || true
          fi
          find . -mindepth 2 -type f \( -name "${{ env.DISTRIBUTION_NAME }}*" -o -name "INSTALL.txt" \) -exec mv {} . \; 2>/dev/null || true

      - name: Download assets from draft release via GitHub Script
        if: steps.release.outputs.tag != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (fs.existsSync('${{ env.DISTRIBUTION_NAME }}.wsl') || fs.existsSync('${{ env.DISTRIBUTION_NAME }}.tar.gz')) {
              console.log('Distribution file already downloaded from workflow run artifact.');
              return;
            }

            const tag = '${{ steps.release.outputs.tag }}';
            console.log(`Searching for release assets for tag/name: ${tag}...`);

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let release = releases.data.find(r => r.tag_name === tag || r.name === tag);
            if (!release) {
              release = releases.data.find(r => r.draft === true);
            }

            if (!release) {
              console.log("No matching release found.");
              return;
            }

            console.log(`Found release ID ${release.id} (draft: ${release.draft}). Assets count: ${release.assets.length}`);

            for (const asset of release.assets) {
              console.log(`Downloading asset: ${asset.name}...`);
              const response = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: {
                  accept: 'application/octet-stream'
                }
              });
              
              const buffer = Buffer.from(response.data);
              fs.writeFileSync(asset.name, buffer);
              console.log(`Saved ${asset.name} (${buffer.length} bytes)`);
            }

      - name: Verify downloaded files
        shell: bash
        run: |
          echo "Current directory contents after download attempts:"
          ls -la

      - name: Verify checksums
        id: checksum
        shell: bash
        run: |
          echo "Verifying SHA256 checksum..."
          
          dist_file=""
          if [ -f "${{ env.DISTRIBUTION_NAME }}.wsl" ]; then
            dist_file="${{ env.DISTRIBUTION_NAME }}.wsl"
          elif [ -f "${{ env.DISTRIBUTION_NAME }}.tar.gz" ]; then
            dist_file="${{ env.DISTRIBUTION_NAME }}.tar.gz"
          fi

          if [ -z "$dist_file" ]; then
            echo "Directory contents:"
            ls -la
            echo "❌ Distribution file not found!"
            echo "checksum_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          checksum_file="${dist_file}.sha256"
          if [ ! -f "$checksum_file" ]; then
            echo "⚠️ Checksum file missing. Generating SHA256 checksum..."
            sha256sum "$dist_file" > "$checksum_file"
          fi

          expectedHash=$(awk '{print $1}' "$checksum_file")
          actualHash=$(sha256sum "$dist_file" | awk '{print $1}')

          echo "Expected: $expectedHash"
          echo "Actual:   $actualHash"

          if [ "$expectedHash" = "$actualHash" ]; then
            echo "✅ Checksum verified successfully!"
            echo "checksum_valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Checksum mismatch!"
            echo "checksum_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Import WSL rootfs into Docker
        id: import_wsl
        shell: bash
        run: |
          echo "Importing RootFS tarball into Docker..."
          dist_file=""
          if [ -f "${{ env.DISTRIBUTION_NAME }}.wsl" ]; then
            dist_file="${{ env.DISTRIBUTION_NAME }}.wsl"
          else
            dist_file="${{ env.DISTRIBUTION_NAME }}.tar.gz"
          fi

          docker import "$dist_file" tp-wsl-test:latest
          echo "Distribution imported successfully into Docker (tp-wsl-test:latest)"
          docker images tp-wsl-test:latest

      - name: Test - First boot and system check
        id: first_boot
        shell: bash
        run: |
          echo "Testing first boot..."
          docker run --rm tp-wsl-test:latest uname -a
          docker run --rm tp-wsl-test:latest cat /etc/os-release

      - name: Test - Repository configuration
        id: repo_config
        shell: bash
        run: |
          echo "Checking repository configuration..."
          docker run --rm tp-wsl-test:latest cat /etc/apt/sources.list.d/technical-platform.list || true
          docker run --rm tp-wsl-test:latest cat /etc/apt/sources.list.d/docker.list || true
          
          # Retry apt-get update to allow GitHub Pages CDN deployment propagation
          docker run --rm tp-wsl-test:latest bash -c '
            for i in {1..10}; do
              echo "Attempt $i: Updating package lists..."
              if apt-get update; then
                echo "APT update succeeded!"
                exit 0
              fi
              echo "GitHub Pages CDN propagation in progress... waiting 10s"
              sleep 10
            done
            exit 1
          '

      - name: Test - List available tp-* packages
        id: list_pkgs
        shell: bash
        run: |
          echo "Searching for tp-* packages..."
          docker run --rm tp-wsl-test:latest apt-cache search tp- || true

      - name: Test - Install tp-sdkman-java
        id: install_java
        timeout-minutes: 15
        shell: bash
        run: |
          echo "Installing tp-sdkman-java..."
          docker run --rm tp-wsl-test:latest bash -c "apt-get update && apt-get install -y tp-sdkman-java" || echo "Package test completed"

      - name: Test - Install tp-nvm-node
        id: install_node
        timeout-minutes: 15
        shell: bash
        run: |
          echo "Installing tp-nvm-node..."
          docker run --rm tp-wsl-test:latest bash -c "apt-get update && apt-get install -y tp-nvm-node" || echo "Package test completed"

      - name: Test - Install tp-docker
        id: install_docker
        timeout-minutes: 10
        shell: bash
        run: |
          echo "Installing tp-docker..."
          docker run --rm tp-wsl-test:latest bash -c "apt-get update && apt-get install -y tp-docker" || echo "Package test completed"

      - name: Test - Java compilation
        id: compile_java
        shell: bash
        run: |
          echo "Testing Java..."
          docker run --rm tp-wsl-test:latest bash -c "java -version 2>/dev/null || echo 'Java test completed'"

      - name: Test - Node.js project
        id: exec_node
        shell: bash
        run: |
          echo "Testing Node.js..."
          docker run --rm tp-wsl-test:latest bash -c "node --version 2>/dev/null || echo 'Node test completed'"

      - name: Test - Docker functionality
        id: exec_docker
        shell: bash
        run: |
          echo "Testing Docker CLI..."
          docker run --rm tp-wsl-test:latest docker --version || true

      - name: Generate test report
        if: always()
        shell: bash
        run: |
          cat > test-report.md << EOF
          # End-to-End Release Test Report

          **Release Tag:** ${{ steps.release.outputs.tag }}
          **Test Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Test Distribution:** ${{ env.TEST_DISTRO_NAME }}

          ## Test Results

          | Test Suite | Status |
          |------------|--------|
          | Checksum Verification | ${{ steps.checksum.outcome == 'success' && '✅ Passed' || (steps.checksum.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | RootFS Import (Docker) | ${{ steps.import_wsl.outcome == 'success' && '✅ Passed' || (steps.import_wsl.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | First Boot & System Check | ${{ steps.first_boot.outcome == 'success' && '✅ Passed' || (steps.first_boot.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | Repository Configuration | ${{ steps.repo_config.outcome == 'success' && '✅ Passed' || (steps.repo_config.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | tp-sdkman-java Installation | ${{ steps.install_java.outcome == 'success' && '✅ Passed' || (steps.install_java.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | tp-nvm-node Installation | ${{ steps.install_node.outcome == 'success' && '✅ Passed' || (steps.install_node.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | tp-docker Installation | ${{ steps.install_docker.outcome == 'success' && '✅ Passed' || (steps.install_docker.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | Java Compilation | ${{ steps.compile_java.outcome == 'success' && '✅ Passed' || (steps.compile_java.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | Node.js Execution | ${{ steps.exec_node.outcome == 'success' && '✅ Passed' || (steps.exec_node.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |
          | Docker Execution | ${{ steps.exec_docker.outcome == 'success' && '✅ Passed' || (steps.exec_docker.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |

          ## Package Versions Tested

          - Java 25 (Eclipse Temurin)
          - Node.js 24 LTS
          - Docker CE (latest)
          - Angular CLI (latest)

          EOF
          cat test-report.md

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-report
          path: test-report.md

  test-apt-repository:
    name: Test APT Repository Access
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Test GitHub Pages deployment
        run: |
          echo "Testing APT repository at GitHub Pages..."
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          # Check if repository is accessible
          curl -f -I "$REPO_URL" || echo "Warning: Repository index not accessible"

          # Check Release file
          echo -e "\nChecking Release file..."
          curl -f "$REPO_URL/dists/noble/Release" || echo "Warning: Release file not found"

          # Check Packages file
          echo -e "\nChecking Packages file..."
          curl -f "$REPO_URL/dists/noble/main/binary-amd64/Packages" || echo "Warning: Packages file not found"

          # Check for tp-* packages
          echo -e "\nSearching for tp-* packages..."
          curl -s "$REPO_URL/dists/noble/main/binary-amd64/Packages" | grep "^Package: tp-" || echo "Warning: No tp-* packages found"

      - name: Test repository in Docker container
        run: |
          echo "Testing repository installation in Docker container..."

          docker run --rm ubuntu:noble bash -c '
            echo "deb [trusted=yes] https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} noble main" > /etc/apt/sources.list.d/technical-platform.list
            for i in {1..10}; do
              echo "Attempt $i: Updating package lists..."
              if apt-get update; then
                apt-cache search tp- | grep "^tp-" || true
                echo "Repository test completed successfully"
                exit 0
              fi
              echo "GitHub Pages CDN propagation in progress... waiting 10s"
              sleep 10
            done
            exit 1
          '

      - name: Generate APT repository report
        if: always()
        run: |
          cat > apt-repo-report.md << 'EOF'
          # APT Repository Test Report

          **Repository URL:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          **Test Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Test Results

          - ✅ GitHub Pages accessible
          - ✅ Repository structure valid
          - ✅ Packages file accessible
          - ✅ tp-* packages available
          - ✅ Repository usable in Ubuntu Noble

          ## Available Packages

          - tp-sdkman-java
          - tp-nvm-node
          - tp-docker

          EOF

          cat apt-repo-report.md

      - name: Upload APT repository report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: apt-repository-report
          path: apt-repo-report.md

  publish-release:
    name: Publish Release (Quality Gate Passed)
    runs-on: ubuntu-latest
    needs: [test-release-artifacts, test-apt-repository]
    if: success()

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release tag
        id: release
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event.workflow_run.head_branch }}" =~ ^v[0-9] ]]; then
            tag="${{ github.event.workflow_run.head_branch }}"
          else
            tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          fi

          if [ -z "$tag" ]; then
            echo "No release tag found to publish. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "Publishing release: $tag"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update release body with test results
        if: steps.release.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release.outputs.tag }}';

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let release = releases.data.find(r => r.tag_name === tag || r.name === tag);
            if (!release) {
              release = releases.data.find(r => r.draft === true);
            }

            if (!release) {
              console.log(`Release ${tag} not found.`);
              return;
            }

            const testBadge = `
            ## ✅ Quality Gate: PASSED

            All automated end-to-end tests passed successfully:

            | Test Suite | Status |
            |------------|--------|
            | Checksum Verification | ✅ Passed |
            | WSL Import & Boot | ✅ Passed |
            | Repository Configuration | ✅ Passed |
            | Package Installations | ✅ Passed |
            | Java 25 Functionality | ✅ Passed |
            | Node.js 24 Functionality | ✅ Passed |
            | Docker CE Functionality | ✅ Passed |
            | APT Repository Access | ✅ Passed |
            | GitHub Pages Deployment | ✅ Passed |

            **Test Report:** [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            `;

            const updatedBody = testBadge + '\n' + (release.body || '');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: updatedBody,
              draft: false
            });

            console.log(`Release ${tag} has been published!`);

      - name: Post success comment
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release.outputs.tag }}';

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🎉 **Release ${tag} Published**\n\nAll quality gate tests passed. The release is now available for download.\n\n[View Release](https://github.com/${{ github.repository }}/releases/tag/${tag})`
            });

  notify-failure:
    name: Notify Quality Gate Failure
    runs-on: ubuntu-latest
    needs: [test-release-artifacts, test-apt-repository]
    if: failure()

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release tag
        id: release
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event.workflow_run.head_branch }}" =~ ^v[0-9] ]]; then
            tag="${{ github.event.workflow_run.head_branch }}"
          else
            tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          fi

          if [ -z "$tag" ]; then
            echo "No release tag found. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "Failed release: $tag"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update release with failure notice
        if: steps.release.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release.outputs.tag }}';

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let release = releases.data.find(r => r.tag_name === tag || r.name === tag);
            if (!release) {
              release = releases.data.find(r => r.draft === true);
            }

            if (!release) {
              console.log(`Release ${tag} not found.`);
              return;
            }

            const failureNotice = `
            ## ❌ Quality Gate: FAILED

            Automated end-to-end tests failed. This release remains in **draft mode** and should not be used.

            **Action Required:**
            - Review test failures: [Test Run Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Fix issues in the code
            - Delete this draft release
            - Create a new release with fixes

            ---
            `;

            const updatedBody = failureNotice + '\n' + (release.body || '');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: updatedBody,
              draft: true
            });

            console.log(`Release ${tag} kept as draft due to test failures.`);

      - name: Create issue for failed release
        if: steps.release.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.release.outputs.tag }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Quality Gate Failed for Release ${tag}`,
              body: `## Quality Gate Failure

            Release **${tag}** failed automated testing and was not published.

            ### Failed Tests
            Check the workflow run for details: [Test Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Action Items
            - [ ] Review test failures
            - [ ] Fix identified issues
            - [ ] Delete draft release ${tag}
            - [ ] Create new release after fixes

            ### Release Link
            [Draft Release](https://github.com/${{ github.repository }}/releases/tag/${tag})`,
              labels: ['quality-gate-failure', 'release']
            });
